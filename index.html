<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIVA-5 — ADHD Diagnostic Assessment</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=5">
</head>
<body>

<header id="app-header">
  <div class="header-inner">
    <div class="brand">
      <div class="brand-badge">DIVA-5</div>
      <div>
        <div class="brand-title" id="brand-title">Diagnostic Interview for ADHD in adults</div>
        <div class="brand-sub" id="brand-sub">Patient version · DSM-5 criteria</div>
      </div>
    </div>
    <div class="mode-toggle" id="mode-toggle">
      <button type="button" data-mode="adult">Adult · 17+</button>
      <button type="button" data-mode="young">Young · 5–17</button>
    </div>
    <div class="scores" id="scores"><!-- filled by JS --></div>
  </div>
</header>

<main id="main">

  <!-- Patient -->
  <section id="patient">
    <div><label>Name of patient</label><input id="p-name" type="text"></div>
    <div><label>Date of birth</label><input id="p-dob" type="date"></div>
    <div><label>Sex</label>
      <select id="p-sex"><option value=""></option><option>Female</option><option>Male</option><option>Other</option></select>
    </div>
    <div><label>Date of assessment</label><input id="p-date" type="date"></div>
  </section>

  <p class="note" id="intro-note"></p>

  <!-- Parts rendered by JS -->
  <div id="part1"></div>
  <div id="part2"></div>
  <div id="part3"></div>

  <!-- Case note generator -->
  <section id="casenote">
    <div class="cn-bar">
      <button class="btn btn-ai" id="cn-go">📝 Generate HPI case note</button>
      <button class="btn btn-ghost" id="cn-copy" style="display:none">📋 Copy</button>
      <span id="cn-status"></span>
    </div>
    <p class="note">Drafts the <strong>History of Presenting Illness</strong> only, in clinical case-note style, weaving together your free-text notes and every ticked item. Review and edit before pasting into the record.</p>
    <textarea id="cn-out" placeholder="The generated HPI will appear here — then press Copy." readonly></textarea>
  </section>

</main>

<!-- Toolbar -->
<div id="toolbar">
  <div class="toolbar-inner">
    <button class="btn btn-ghost" id="btn-print">🖨 Print / PDF</button>
    <button class="btn btn-ghost" id="btn-save">💾 Save (JSON)</button>
    <button class="btn btn-ghost" id="btn-load">📂 Load</button>
    <button class="btn btn-ghost" id="btn-reset">↺ Reset</button>
    <input type="file" id="file-load" accept="application/json" hidden>
    <span class="spacer"></span>
    <span class="small" id="autosave-note">Autosaved locally</span>
  </div>
</div>

<script src="data.js?v=5"></script>
<script src="data_young.js?v=5"></script>
<script src="app.js?v=5"></script>
</body>
</html>
